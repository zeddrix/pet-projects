name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      BASE_PATH: /${{ github.event.repository.name }}
      PUBLIC_SITE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write CI environment file
        run: |
          printf '%s\n' \
            "PUBLIC_SITE_URL=${PUBLIC_SITE_URL}" \
            "BASE_PATH=${BASE_PATH}" \
            > .env

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build blog-app static preview
        run: node scripts/build-blog-app-static.mjs

      - name: Build microposts static preview
        run: node scripts/build-microposts-static.mjs

      - name: Setup Node 16 for github-finder-jsx CRA
        uses: actions/setup-node@v4
        with:
          node-version: "16"
          cache: "npm"
          cache-dependency-path: projects/github-finder-jsx/package-lock.json

      - name: Build github-finder-jsx static preview
        run: node scripts/build-github-finder-jsx-static.mjs
        env:
          SKIP_PREFLIGHT_CHECK: "true"
          CI: "false"

      - name: Restore Node 22 for wrapper toolchain
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Sync pet projects
        run: pnpm sync-projects

      - name: Quality gate
        run: pnpm quality

      - name: Unit tests
        run: pnpm test:unit

      - name: E2E tests
        run: pnpm test:e2e

      - name: Install Python test dependencies
        run: pip install pytest

      - name: DIBP engine tests
        run: pnpm test:dibp-engine

      - name: DIBP game E2E tests
        run: pnpm test:dibp-e2e

      - name: Build static site
        run: pnpm build:pages

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  verify-live:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Verify live deploy assets
        run: node scripts/verify-live-deploy.mjs
        env:
          LIVE_SITE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
          LIVE_VERIFY_RETRIES: "6"
          LIVE_VERIFY_DELAY_MS: "15000"
