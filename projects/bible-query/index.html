<!DOCTYPE html>
<html>
  <head>
    <title>BIBLE QUERY</title>
    <link rel="stylesheet" href="/styles/style.css" />
  </head>
  <body>
    <div class="container" id="bk-img">
      <h1>BIBLE QUERY</h1>
      <div id="all-long-btns">
        <a href="/bible-query/templates/levels.html">
          <img src="/img/play-btn.jpg" class="long-btn"/>
        </a>
        <a href="/bible-query/templates/settings.html">
          <img src="/img/settings-btn.jpg" class="long-btn"/>
        </a>
        <a href="/bible-query/templates/rules.html" >
          <img src="/img/rules-btn.jpg" class="long-btn"/>
        </a>
        <a href="/bible-query/templates/about.html">
          <img src="/img/about-btn.jpg" class="long-btn" />
        </a>
          <!-- tell your friends! -->
        <img class="long-btn" src="/bible-query/img/tell-your-friends-btn.jpg"
        onclick="alert('You are temporarily leaving the game to send a recommendation using your preferred messaging application.')"/>
        <!-- quit -->
        <img class="long-btn" src="/bible-query/img/quit-btn.jpg"
        onclick="myFunction()" />
      </div>
      <p id="demo"></p>
    </div>
  </body>
  <script>
    function myFunction() {
      var txt;
      if (confirm("Are you sure you want to quit?")) {
        txt = "Bye!";
      } else {
        txt = "Welcome back!";
      }
      document.getElementById("demo").innerHTML = txt;
    }
  </script>
</html>
