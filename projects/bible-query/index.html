<!DOCTYPE html>
<html>
  <head>
    <title>BIBLE QUERY</title>
    <link rel="stylesheet" href="styles/style.css" />
  </head>
  <body>
    <div class="outer-container" id="bk-img">
      <div class="container" id="bk-img">
        <h1 id="bible-query-title">BIBLE QUERY</h1>
        <div id="long-btn-container">
          <a href="templates/levels.html">
            <img src="img/play-btn.jpg" class="long-btn" />
          </a>
          <a href="templates/settings.html">
            <img src="img/settings-btn.jpg" class="long-btn" />
          </a>
          <a href="templates/rules.html">
            <img src="img/rules-btn.jpg" class="long-btn" />
          </a>
          <a href="templates/about.html">
            <img src="img/about-btn.jpg" class="long-btn" />
          </a>
          <!-- tell your friends! -->
          <img
            src="img/tell-your-friends-btn.jpg"
            class="long-btn"
            onclick="alert('You are temporarily leaving the game to send a recommendation using your preferred messaging application.')"
          />
          <!-- quit -->
          <img src="img/quit-btn.jpg" class="long-btn" onclick="myFunction()" />
        </div>
        <p id="demo"></p>
      </div>
    </div>
  </body>
  <script>
    function myFunction() {
      var txt;
      if (confirm("Are you sure you want to quit?")) {
        txt = "Bye!";
      } else {
        txt = "Welcome back!";
      }
      document.getElementById("demo").innerHTML = txt;
    }
  </script>
</html>
