<!DOCTYPE html>
<html>
<head>
	<title>settings</title>
</head>
<body>
	<h1>Settings</h1>
	<br>
		<input type="checkbox" value="Music">
		<label for="Music">Music</label>
		<br>
		<input type="checkbox" value="Sound Effects">
		<label for="Sound Effects">Sound Effects</label>	
		<br>	
		<input type="checkbox" value="Play with time limit">
		<label for="Play with time limit">Time Limit</label>			
		<h2>Language</h2>
			<input type="radio" value="English">
			<label for="English">English</label>
			<br>
			<input type="radio" value="Tagalog">
			<label for="Tagalog">Tagalog</label>
			<br><br>
		<button>Game Reset</button>
		<br>
		<button>BACK</button>
</body>
</html>
